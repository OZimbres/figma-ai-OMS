<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1280" height="800" fill="#F3F4F6"/>

  <!-- Sidebar -->
  <rect width="220" height="800" fill="#1F2937"/>
  <text x="20" y="40" fill="white" font-size="16" font-weight="bold">🍽  RestaurantOS</text>
  <line x1="0" y1="55" x2="220" y2="55" stroke="#374151" stroke-width="1"/>
  <text x="16" y="80" fill="#9CA3AF" font-size="11">ADMIN</text>
  <text x="20" y="110" fill="#D1D5DB" font-size="14">📈  Relatórios</text>
  <rect x="8" y="120" width="204" height="34" rx="6" fill="#3B82F6"/>
  <text x="20" y="142" fill="white" font-size="14">⚙️  Configurações</text>
  <text x="20" y="790" fill="#9CA3AF" font-size="13">👤  Admin User</text>

  <!-- Title -->
  <text x="250" y="52" fill="#111827" font-size="22" font-weight="bold">Settings</text>

  <!-- Tab bar -->
  <rect x="240" y="66" width="970" height="40" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Active tab -->
  <rect x="240" y="66" width="250" height="40" rx="6" fill="#F3F4F6" stroke="#3B82F6" stroke-width="2"/>
  <text x="365" y="92" fill="#3B82F6" font-size="13" font-weight="bold" text-anchor="middle">Restaurant Info</text>
  <text x="620" y="92" fill="#6B7280" font-size="13" text-anchor="middle">Notifications</text>
  <text x="860" y="92" fill="#6B7280" font-size="13" text-anchor="middle">Staff</text>

  <!-- Form area -->
  <rect x="240" y="116" width="970" height="640" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>

  <text x="268" y="150" fill="#374151" font-size="13">Restaurant Name:</text>
  <rect x="268" y="158" width="580" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="178" fill="#374151" font-size="13">RestaurantOS Demo</text>

  <text x="268" y="208" fill="#374151" font-size="13">Address:</text>
  <rect x="268" y="216" width="580" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="236" fill="#374151" font-size="13">123 Main Street, Paris</text>

  <text x="268" y="266" fill="#374151" font-size="13">Phone:</text>
  <rect x="268" y="274" width="580" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="294" fill="#374151" font-size="13">+33 1 23 45 67 89</text>

  <text x="268" y="324" fill="#374151" font-size="13">Email:</text>
  <rect x="268" y="332" width="580" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="352" fill="#374151" font-size="13">contact@restaurantos.com</text>

  <text x="268" y="382" fill="#374151" font-size="13">Currency:</text>
  <rect x="268" y="390" width="580" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="410" fill="#374151" font-size="13">USD ($)</text>

  <text x="268" y="440" fill="#374151" font-size="13">Tax Rate (%):</text>
  <rect x="268" y="448" width="120" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="468" fill="#374151" font-size="13">10</text>
  <text x="380" y="468" fill="#9CA3AF" font-size="14">↑↓</text>

  <text x="268" y="498" fill="#374151" font-size="13">Number of Tables:</text>
  <rect x="268" y="506" width="120" height="30" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="284" y="526" fill="#374151" font-size="13">10</text>
  <text x="380" y="526" fill="#9CA3AF" font-size="14">↑↓</text>

  <rect x="268" y="558" width="160" height="34" rx="6" fill="#3B82F6"/>
  <text x="348" y="580" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Save Settings</text>
</svg>
