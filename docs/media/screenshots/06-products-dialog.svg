<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="500" height="360" fill="#F3F4F6"/>
  <!-- Dialog box -->
  <rect x="60" y="10" width="380" height="340" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="60" y="10" width="380" height="44" rx="8" fill="#F9FAFB"/>
  <rect x="60" y="38" width="380" height="16" fill="#F9FAFB"/>
  <text x="250" y="38" fill="#111827" font-size="15" font-weight="bold" text-anchor="middle">Add Product</text>

  <text x="80" y="70" fill="#374151" font-size="12">Name:</text>
  <rect x="80" y="76" width="340" height="26" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="96" y="94" fill="#9CA3AF" font-size="12">Product name</text>

  <text x="80" y="120" fill="#374151" font-size="12">Category:</text>
  <rect x="80" y="126" width="340" height="26" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="96" y="144" fill="#374151" font-size="12">Drinks</text>
  <text x="404" y="144" fill="#9CA3AF" font-size="14">▼</text>

  <text x="80" y="170" fill="#374151" font-size="12">Price:</text>
  <rect x="80" y="176" width="340" height="26" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="96" y="194" fill="#9CA3AF" font-size="12">Price</text>

  <text x="80" y="220" fill="#374151" font-size="12">Prep Time:</text>
  <rect x="80" y="226" width="340" height="26" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="96" y="244" fill="#9CA3AF" font-size="12">Prep time (min)</text>

  <text x="80" y="270" fill="#374151" font-size="12">Emoji:</text>
  <rect x="80" y="276" width="340" height="26" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="96" y="294" fill="#9CA3AF" font-size="12">Emoji</text>

  <!-- Available checkbox -->
  <rect x="80" y="312" width="14" height="14" rx="2" fill="#3B82F6"/>
  <text x="104" y="324" fill="#374151" font-size="13">Available</text>

  <!-- Buttons -->
  <rect x="80" y="340" width="150" height="32" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="155" y="361" fill="#374151" font-size="13" text-anchor="middle">Cancel</text>
  <rect x="270" y="340" width="150" height="32" rx="4" fill="#3B82F6"/>
  <text x="345" y="361" fill="white" font-size="13" text-anchor="middle">Save</text>
</svg>
