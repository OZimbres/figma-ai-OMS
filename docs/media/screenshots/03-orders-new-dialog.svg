<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="500" height="280" fill="#F3F4F6"/>
  <!-- Dialog box -->
  <rect x="100" y="20" width="300" height="240" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="100" y="20" width="300" height="40" rx="8" fill="#F9FAFB"/>
  <rect x="100" y="44" width="300" height="16" fill="#F9FAFB"/>
  <text x="250" y="46" fill="#111827" font-size="15" font-weight="bold" text-anchor="middle">New Order</text>
  <text x="250" y="66" fill="#6B7280" font-size="12" text-anchor="middle">Create a new order</text>

  <text x="116" y="94" fill="#374151" font-size="12">Table #:</text>
  <rect x="116" y="100" width="268" height="28" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="132" y="119" fill="#9CA3AF" font-size="12">Table number</text>

  <text x="116" y="144" fill="#374151" font-size="12">Client:</text>
  <rect x="116" y="150" width="268" height="28" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="132" y="169" fill="#9CA3AF" font-size="12">Client name</text>

  <text x="116" y="194" fill="#374151" font-size="12">Waiter:</text>
  <rect x="116" y="200" width="268" height="28" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="132" y="219" fill="#9CA3AF" font-size="12">Waiter name</text>

  <!-- Buttons -->
  <rect x="116" y="242" width="120" height="32" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="176" y="263" fill="#374151" font-size="13" text-anchor="middle">Cancel</text>
  <rect x="264" y="242" width="120" height="32" rx="4" fill="#3B82F6"/>
  <text x="324" y="263" fill="white" font-size="13" text-anchor="middle">Create</text>
</svg>
