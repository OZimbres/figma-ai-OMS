  <rect x="530" y="0" width="490" height="800" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="550" y="36" fill="#111827" font-size="18" font-weight="bold">Order ORD-001</text>

  <text x="550" y="72" fill="#374151" font-size="13">Table: 3  |  Client: Maria Silva  |  Waiter: Jean</text>
  <text x="550" y="96" fill="#374151" font-size="13">Status: Preparing  |  Priority: Normal</text>
  <text x="550" y="120" fill="#374151" font-size="13">Created: 14:32 15/03  |  Est. Prep: 20 min</text>
  <text x="550" y="144" fill="#374151" font-size="13">Special: None</text>

