  <rect x="1020" y="0" width="260" height="800" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1038" y="36" fill="#111827" font-size="15" font-weight="600">Add Items</text>

  <!-- Product buttons -->
  <rect x="1030" y="48" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="71" fill="#374151" font-size="13">🍕 Pizza Margherita - $18.00</text>

  <rect x="1030" y="92" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="115" fill="#374151" font-size="13">🍔 Hambúrguer - $15.00</text>

  <rect x="1030" y="136" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="159" fill="#374151" font-size="13">🥗 Salada César - $12.00</text>

  <rect x="1030" y="180" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="203" fill="#374151" font-size="13">🥤 Suco de Laranja - $3.00</text>

  <rect x="1030" y="224" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="247" fill="#374151" font-size="13">☕ Café Espresso - $4.50</text>

  <rect x="1030" y="268" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="291" fill="#374151" font-size="13">🍰 Petit Gateau - $9.00</text>

  <rect x="1030" y="312" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1045" y="335" fill="#374151" font-size="13">🍷 Vinho Tinto - $22.00</text>
</svg>
