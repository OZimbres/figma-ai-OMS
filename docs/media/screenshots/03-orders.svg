  <!-- Order list items -->
  <rect x="232" y="172" width="286" height="56" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="248" y="194" fill="#1D4ED8" font-size="13" font-weight="bold">#ORD-001  Mesa 3</text>
  <text x="248" y="214" fill="#6B7280" font-size="12">Maria Silva  |  Preparing  |  $47.50</text>

  <line x1="232" y1="228" x2="518" y2="228" stroke="#F3F4F6" stroke-width="1"/>
  <text x="248" y="250" fill="#111827" font-size="13" font-weight="bold">#ORD-002  Mesa 1</text>
  <text x="248" y="270" fill="#6B7280" font-size="12">João Costa  |  Ready  |  $62.00</text>

  <line x1="232" y1="284" x2="518" y2="284" stroke="#F3F4F6" stroke-width="1"/>
  <text x="248" y="306" fill="#111827" font-size="13" font-weight="bold">#ORD-003  Mesa 5</text>
  <text x="248" y="326" fill="#6B7280" font-size="12">Ana Lima  |  New  |  $35.00</text>

  <line x1="232" y1="340" x2="518" y2="340" stroke="#F3F4F6" stroke-width="1"/>
  <text x="248" y="362" fill="#111827" font-size="13" font-weight="bold">#ORD-004  Mesa 8</text>
  <text x="248" y="382" fill="#6B7280" font-size="12">Pedro Alves  |  Completed  |  $88.50</text>

  <line x1="232" y1="396" x2="518" y2="396" stroke="#F3F4F6" stroke-width="1"/>
  <text x="248" y="418" fill="#111827" font-size="13" font-weight="bold">#ORD-005  Mesa 2</text>
  <text x="248" y="438" fill="#6B7280" font-size="12">Clara Santos  |  Completed  |  $55.00</text>

