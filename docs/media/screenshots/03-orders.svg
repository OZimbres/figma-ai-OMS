  <rect x="618" y="230" width="70" height="28" rx="4" fill="#3B82F6"/>
  <text x="653" y="249" fill="white" font-size="12" text-anchor="middle">Normal</text>
  <rect x="696" y="230" width="60" height="28" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
