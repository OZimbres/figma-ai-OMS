  <text x="720" y="321" fill="#374151" font-size="12" font-weight="bold">Qty</text>
  <text x="760" y="321" fill="#374151" font-size="12" font-weight="bold">Price</text>
  <text x="820" y="321" fill="#374151" font-size="12" font-weight="bold">Status</text>
  <text x="900" y="321" fill="#374151" font-size="12" font-weight="bold">Notes</text>

  <line x1="530" y1="332" x2="1020" y2="332" stroke="#E5E7EB" stroke-width="1"/>
  <text x="548" y="354" fill="#374151" font-size="13">🍕 Pizza Margherita</text>
  <text x="720" y="354" fill="#374151" font-size="13">1</text>
  <text x="760" y="354" fill="#374151" font-size="13">$18.00</text>
  <text x="820" y="354" fill="#6B7280" font-size="12">Pending</text>
  <text x="900" y="354" fill="#6B7280" font-size="12">—</text>
  <rect x="985" y="340" width="24" height="22" rx="3" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="997" y="356" fill="#EF4444" font-size="12" text-anchor="middle">X</text>

  <line x1="530" y1="366" x2="1020" y2="366" stroke="#F3F4F6" stroke-width="1"/>
  <text x="548" y="388" fill="#374151" font-size="13">🥤 Suco de Laranja</text>
  <text x="720" y="388" fill="#374151" font-size="13">2</text>
  <text x="760" y="388" fill="#374151" font-size="13">$6.00</text>
  <text x="820" y="388" fill="#6B7280" font-size="12">Pending</text>
  <text x="900" y="388" fill="#6B7280" font-size="12">gelado</text>
  <rect x="985" y="374" width="24" height="22" rx="3" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="997" y="390" fill="#EF4444" font-size="12" text-anchor="middle">X</text>

  <text x="550" y="428" fill="#111827" font-size="15" font-weight="bold">Total: $30.00</text>

