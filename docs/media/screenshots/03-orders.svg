  <text x="20" y="110" fill="#D1D5DB" font-size="14">📊  Dashboard</text>
  <!-- Active: Orders -->
  <rect x="8" y="120" width="204" height="34" rx="6" fill="#3B82F6"/>
  <text x="20" y="142" fill="white" font-size="14">📋  Pedidos</text>
  <text x="20" y="166" fill="#D1D5DB" font-size="14">👨‍🍳  Cozinha</text>
  <text x="20" y="190" fill="#D1D5DB" font-size="14">🪑  Mesas</text>
  <line x1="0" y1="202" x2="220" y2="202" stroke="#374151" stroke-width="1"/>
  <text x="16" y="222" fill="#9CA3AF" font-size="11">GESTÃO</text>
  <text x="20" y="246" fill="#D1D5DB" font-size="14">🍽  Produtos</text>
  <text x="20" y="270" fill="#D1D5DB" font-size="14">👥  Clientes</text>
  <text x="20" y="294" fill="#D1D5DB" font-size="14">💰  Cobranças</text>
