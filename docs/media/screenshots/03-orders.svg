  <rect x="550" y="188" width="60" height="28" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="580" y="207" fill="#374151" font-size="12" text-anchor="middle">New</text>
  <rect x="618" y="188" width="60" height="28" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
