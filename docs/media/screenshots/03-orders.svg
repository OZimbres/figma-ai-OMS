  <text x="16" y="326" fill="#9CA3AF" font-size="11">ADMIN</text>
  <text x="20" y="350" fill="#D1D5DB" font-size="14">📈  Relatórios</text>
  <text x="20" y="374" fill="#D1D5DB" font-size="14">⚙️  Configurações</text>
  <line x1="0" y1="770" x2="220" y2="770" stroke="#374151" stroke-width="1"/>
  <text x="20" y="790" fill="#9CA3AF" font-size="13">👤  Admin User</text>

  <!-- Left Panel (Order List) -->
  <rect x="220" y="0" width="310" height="800" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="240" y="36" fill="#111827" font-size="16" font-weight="600">Orders</text>

  <!-- Search field -->
  <rect x="232" y="48" width="286" height="32" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
