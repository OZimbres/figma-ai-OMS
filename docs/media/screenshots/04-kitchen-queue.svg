<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1280" height="800" fill="#F3F4F6"/>

  <!-- Sidebar -->
  <rect width="220" height="800" fill="#1F2937"/>
  <text x="20" y="40" fill="white" font-size="16" font-weight="bold">🍽  RestaurantOS</text>
  <line x1="0" y1="55" x2="220" y2="55" stroke="#374151" stroke-width="1"/>
  <text x="16" y="80" fill="#9CA3AF" font-size="11">OPERAÇÕES</text>
  <text x="20" y="110" fill="#D1D5DB" font-size="14">📊  Dashboard</text>
  <text x="20" y="138" fill="#D1D5DB" font-size="14">📋  Pedidos</text>
  <!-- Active: Kitchen -->
  <rect x="8" y="148" width="204" height="34" rx="6" fill="#3B82F6"/>
  <text x="20" y="170" fill="white" font-size="14">👨‍🍳  Cozinha</text>
  <text x="20" y="198" fill="#D1D5DB" font-size="14">🪑  Mesas</text>
  <line x1="0" y1="210" x2="220" y2="210" stroke="#374151" stroke-width="1"/>
  <text x="20" y="790" fill="#9CA3AF" font-size="13">👤  Admin User</text>

  <!-- Title -->
  <text x="250" y="52" fill="#111827" font-size="22" font-weight="bold">Kitchen Queue</text>

  <!-- Column: New Orders -->
  <rect x="240" y="68" width="320" height="700" rx="8" fill="#FEF9C3" stroke="#FDE047" stroke-width="1"/>
  <text x="400" y="98" fill="#854D0E" font-size="16" font-weight="bold" text-anchor="middle">New Orders</text>

  <!-- Card 1 - New -->
  <rect x="256" y="112" width="288" height="200" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="272" y="134" fill="#111827" font-size="13" font-weight="bold">Mesa 5  -  ORD-003</text>
  <text x="272" y="154" fill="#6B7280" font-size="12">Ana Lima  |  Pierre</text>
  <text x="272" y="172" fill="#9CA3AF" font-size="11">Criado: 14:41</text>
  <text x="272" y="192" fill="#6B7280" font-size="12">Prioridade: Normal</text>
  <text x="272" y="214" fill="#374151" font-size="12">  1x Pizza Margherita [Pending]</text>
  <text x="272" y="232" fill="#374151" font-size="12">  2x Suco [Pending] - gelado</text>
  <text x="272" y="252" fill="#9CA3AF" font-size="11">Est: 15 min</text>
  <rect x="256" y="262" width="288" height="34" rx="4" fill="#3B82F6"/>
  <text x="400" y="284" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Mover para Preparing →</text>

  <!-- Column: Preparing -->
  <rect x="578" y="68" width="320" height="700" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="738" y="98" fill="#1E40AF" font-size="16" font-weight="bold" text-anchor="middle">Preparing</text>

  <!-- Card - Preparing (Critical) -->
  <rect x="594" y="112" width="288" height="220" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="610" y="134" fill="#111827" font-size="13" font-weight="bold">Mesa 3  -  ORD-001</text>
  <text x="610" y="154" fill="#6B7280" font-size="12">Maria Silva  |  Jean</text>
  <text x="610" y="172" fill="#9CA3AF" font-size="11">Criado: 14:32</text>
  <text x="610" y="192" fill="#EF4444" font-size="12" font-weight="bold">Prioridade: CRÍTICA</text>
  <text x="610" y="214" fill="#374151" font-size="12">  1x Pizza Margherita [Pending]</text>
  <text x="610" y="232" fill="#F59E0B" font-size="12">  ⚠ Sem glúten</text>
  <text x="610" y="254" fill="#9CA3AF" font-size="11">Est: 20 min</text>
  <rect x="594" y="268" width="288" height="34" rx="4" fill="#3B82F6"/>
  <text x="738" y="290" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Mover para Ready →</text>

  <!-- Column: Ready -->
  <rect x="916" y="68" width="320" height="700" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="1076" y="98" fill="#166534" font-size="16" font-weight="bold" text-anchor="middle">Ready</text>

  <!-- Card - Ready -->
  <rect x="932" y="112" width="288" height="200" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="948" y="134" fill="#111827" font-size="13" font-weight="bold">Mesa 1  -  ORD-002</text>
  <text x="948" y="154" fill="#6B7280" font-size="12">João Costa  |  Marie</text>
  <text x="948" y="172" fill="#9CA3AF" font-size="11">Criado: 14:15</text>
  <text x="948" y="192" fill="#6B7280" font-size="12">Prioridade: Normal</text>
  <text x="948" y="214" fill="#374151" font-size="12">  1x Hambúrguer [Ready]</text>
  <text x="948" y="232" fill="#374151" font-size="12">  1x Batata Frita [Ready]</text>
  <text x="948" y="252" fill="#9CA3AF" font-size="11">Est: 12 min</text>
  <rect x="932" y="268" width="288" height="34" rx="4" fill="#3B82F6"/>
  <text x="1076" y="290" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Mover para Served →</text>
</svg>
