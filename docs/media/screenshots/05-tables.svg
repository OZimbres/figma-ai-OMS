  <line x1="0" y1="210" x2="220" y2="210" stroke="#374151" stroke-width="1"/>
  <text x="20" y="790" fill="#9CA3AF" font-size="13">👤  Admin User</text>

  <!-- Title -->
  <text x="250" y="52" fill="#111827" font-size="22" font-weight="bold">Tables</text>

  <!-- Table Cards Grid -->
