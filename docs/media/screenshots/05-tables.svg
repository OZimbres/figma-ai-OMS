  <rect x="956" y="110" width="96" height="22" rx="4" fill="#EF4444"/>
  <text x="1004" y="126" fill="white" font-size="12" text-anchor="middle">PAY</text>
  <text x="1004" y="166" fill="#6B7280" font-size="12" text-anchor="middle">3/4 seats</text>

  <!-- Row 2 -->
  <rect x="242" y="208" width="155" height="120" rx="8" fill="white" stroke="#10B981" stroke-width="3"/>
