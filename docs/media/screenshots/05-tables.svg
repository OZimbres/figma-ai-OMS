  <text x="662" y="166" fill="#6B7280" font-size="12" text-anchor="middle">3/4 seats</text>

  <!-- Table 4 - WAITING (purple) -->
  <rect x="755" y="68" width="155" height="120" rx="8" fill="white" stroke="#8B5CF6" stroke-width="3"/>
