  <rect x="272" y="110" width="96" height="22" rx="4" fill="#10B981"/>
  <text x="320" y="126" fill="white" font-size="12" text-anchor="middle">FREE</text>
  <text x="320" y="166" fill="#6B7280" font-size="12" text-anchor="middle">0/4 seats</text>

  <!-- Table 2 - OCCUPIED (blue) -->
  <rect x="413" y="68" width="155" height="120" rx="8" fill="white" stroke="#3B82F6" stroke-width="3"/>
