  <text x="833" y="166" fill="#6B7280" font-size="12" text-anchor="middle">2/6 seats</text>

  <!-- Table 5 - PAY (red) -->
  <rect x="926" y="68" width="155" height="120" rx="8" fill="white" stroke="#EF4444" stroke-width="3"/>
