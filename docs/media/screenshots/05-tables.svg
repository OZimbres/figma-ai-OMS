  <rect x="441" y="110" width="100" height="22" rx="4" fill="#3B82F6"/>
  <text x="491" y="126" fill="white" font-size="12" text-anchor="middle">OCCUPIED</text>
  <text x="491" y="166" fill="#6B7280" font-size="12" text-anchor="middle">4/4 seats</text>

  <!-- Table 3 - ORDERING (amber) -->
  <rect x="584" y="68" width="155" height="120" rx="8" fill="white" stroke="#F59E0B" stroke-width="3"/>
