<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1280" height="800" fill="#F3F4F6"/>

  <!-- Sidebar -->
  <rect width="220" height="800" fill="#1F2937"/>
  <text x="20" y="40" fill="white" font-size="16" font-weight="bold">🍽  RestaurantOS</text>
  <line x1="0" y1="55" x2="220" y2="55" stroke="#374151" stroke-width="1"/>
  <text x="16" y="80" fill="#9CA3AF" font-size="11">OPERAÇÕES</text>
  <text x="20" y="110" fill="#D1D5DB" font-size="14">📊  Dashboard</text>
  <text x="20" y="138" fill="#D1D5DB" font-size="14">📋  Pedidos</text>
  <text x="20" y="166" fill="#D1D5DB" font-size="14">👨‍🍳  Cozinha</text>
  <rect x="8" y="176" width="204" height="34" rx="6" fill="#3B82F6"/>
