  <text x="491" y="240" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Table 7</text>
  <rect x="441" y="250" width="100" height="22" rx="4" fill="#3B82F6"/>
  <text x="491" y="266" fill="white" font-size="12" text-anchor="middle">OCCUPIED</text>
  <text x="491" y="306" fill="#6B7280" font-size="12" text-anchor="middle">2/4 seats</text>

  <rect x="584" y="208" width="155" height="120" rx="8" fill="white" stroke="#8B5CF6" stroke-width="3"/>
  <text x="662" y="240" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Table 8</text>
  <rect x="607" y="250" width="110" height="22" rx="4" fill="#8B5CF6"/>
  <text x="662" y="266" fill="white" font-size="12" text-anchor="middle">WAITING</text>
  <text x="662" y="306" fill="#6B7280" font-size="12" text-anchor="middle">4/6 seats</text>

  <rect x="755" y="208" width="155" height="120" rx="8" fill="white" stroke="#10B981" stroke-width="3"/>
  <text x="833" y="240" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Table 9</text>
  <rect x="780" y="250" width="96" height="22" rx="4" fill="#10B981"/>
  <text x="833" y="266" fill="white" font-size="12" text-anchor="middle">FREE</text>
  <text x="833" y="306" fill="#6B7280" font-size="12" text-anchor="middle">0/4 seats</text>

  <rect x="926" y="208" width="155" height="120" rx="8" fill="white" stroke="#EF4444" stroke-width="3"/>
  <text x="1004" y="240" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Table 10</text>
  <rect x="956" y="250" width="96" height="22" rx="4" fill="#EF4444"/>
  <text x="1004" y="266" fill="white" font-size="12" text-anchor="middle">PAY</text>
  <text x="1004" y="306" fill="#6B7280" font-size="12" text-anchor="middle">5/6 seats</text>

  <!-- Side Panel (for Table 3 details) -->
  <rect x="1100" y="0" width="180" height="800" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1116" y="36" fill="#111827" font-size="15" font-weight="bold">Table 3</text>
  <text x="1116" y="60" fill="#374151" font-size="12">Status: Ordering</text>
  <text x="1116" y="80" fill="#374151" font-size="12">Seats: 4  |  Guests: 3</text>
  <text x="1116" y="100" fill="#374151" font-size="12">Occupied: 22 min ago</text>
  <text x="1116" y="130" fill="#374151" font-size="12">Order: ORD-003</text>
  <text x="1116" y="150" fill="#374151" font-size="12">Client: Ana Lima</text>
  <text x="1116" y="170" fill="#374151" font-size="12">Total: $35.00</text>
  <text x="1116" y="200" fill="#111827" font-size="12" font-weight="bold">Change Status:</text>
  <rect x="1110" y="210" width="76" height="26" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1148" y="228" fill="#374151" font-size="11" text-anchor="middle">Free</text>
  <rect x="1194" y="210" width="76" height="26" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1232" y="228" fill="#374151" font-size="11" text-anchor="middle">Occupied</text>
  <rect x="1110" y="244" width="76" height="26" rx="4" fill="#3B82F6"/>
  <text x="1148" y="262" fill="white" font-size="11" text-anchor="middle">Ordering</text>
  <rect x="1194" y="244" width="76" height="26" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1232" y="262" fill="#374151" font-size="11" text-anchor="middle">Waiting</text>
  <rect x="1110" y="278" width="76" height="26" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1148" y="296" fill="#374151" font-size="11" text-anchor="middle">Pay</text>
