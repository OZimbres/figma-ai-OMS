name: Build and Package (jpackage)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build_jpackage:
    name: Build & jpackage (self-hosted Windows)
    runs-on: [self-hosted, windows, fleet-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify WiX Toolset
        shell: powershell
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) { Write-Error "WiX Toolset not found (candle.exe). Install WiX and re-run runner."; exit 1 }

      - name: Show Java & jpackage
        shell: powershell
        run: |
          java -version
          if (-not (Get-Command jpackage -ErrorAction SilentlyContinue)) { Write-Error "jpackage not found in PATH"; exit 1 }

      - name: Build with Gradle
        shell: powershell
        run: .\gradlew.bat clean build

      - name: Run jpackage (Windows)
        shell: powershell
        run: |
          $jpackage = (Get-Command jpackage).Source
          $icon = if (Test-Path 'src\main\resources\images\app.ico') { "--icon src\\main\\resources\\images\\app.ico" } else { "" }
          & $jpackage --type exe --name "Restaurant-OMS" --input "build\libs" --main-jar "restaurant-oms.jar" --main-class "com.restaurantos.App" --java-options "-Xmx512m" --win-dir-chooser --win-shortcut --win-menu $icon --dest "build\jpackage"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: restaurant-installer
          path: build\jpackage\*
