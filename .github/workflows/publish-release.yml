name: Publish Installer as Release

on:
  workflow_run:
    workflows: ["Build and Package (jpackage)"]
    types: [completed]

jobs:
  publish_release:
    name: Publish Release (on success)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: restaurant-installer
          path: ./installer
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find installer file
        id: find_installer
        run: |
          set -e
          FILE=$(ls installer | grep -i '\.exe$' | head -n1 || true)
          if [ -z "$FILE" ]; then echo "No .exe installer found in installer/"; exit 1; fi
          echo "installer=installer/$FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: installer-${{ github.event.workflow_run.head_sha }}
          name: Installer - ${{ github.event.workflow_run.head_sha }}
          body: |
            Automated installer created by the "Build and Package (jpackage)" workflow.
            Workflow run: ${{ github.event.workflow_run.html_url }}
          files: ${{ steps.find_installer.outputs.installer }}
          draft: false
          prerelease: false
